services:
  mysql:
    image: mysql:8.0
    container_name: frank-api-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Shanghai
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./sql/script.sql:/docker-entrypoint-initdb.d/script.sql
    ports:
      - "3306:3306"
    networks:
      - frank-api-network

  redis:
    image: redis:7-alpine
    container_name: frank-api-redis
    restart: always
    volumes:
      - ./redis-data:/data
    networks:
      - frank-api-network
    command: redis-server --appendonly yes

  nacos:
    image: nacos/nacos-server:v2.4.2
    container_name: frank-api-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      TZ: Asia/Shanghai
    volumes:
      - ./nacos-data:/home/nacos/data
      - ./nacos-logs:/home/nacos/logs
    networks:
      - frank-api-network

  frank-api-interface:
    build:
      context: ./interface
      dockerfile: Dockerfile
    container_name: frank-api-interface
    restart: always
    environment:
      SERVER_PORT: 8090
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      - nacos
    networks:
      - frank-api-network

  frank-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank-api-app
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      FRANK_API_GATEWAY_BASE_URL: ${FRANK_API_GATEWAY_BASE_URL}
      FRANK_CLIENT_AK: ${FRANK_CLIENT_AK}
      FRANK_CLIENT_SK: ${FRANK_CLIENT_SK}
      FRANK_CLIENT_BASE_URL: ${FRANK_CLIENT_BASE_URL}
      NACOS_HOST: nacos
      NACOS_PORT: 8848
    ports:
      - "8088:8080"
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - frank-api-network

  frank-api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: frank-api-gateway
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8123
      FRANK_API_INTERFACE_URL: ${FRANK_API_INTERFACE_URL}
      NACOS_HOST: nacos
      NACOS_PORT: 8848
    ports:
      - "8123:8123"
    depends_on:
      - redis
      - nacos
      - frank-api
      - frank-api-interface
    networks:
      - frank-api-network

networks:
  frank-api-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
